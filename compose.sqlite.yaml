services:
  classing:
    build: .
    image: ${CLASSING_IMAGE:-classing-backend:local}
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://api-classing.underflo.ink}
      DATABASE_DRIVER: sqlite
      DATABASE_URL: file:/data/classing.db?_pragma=foreign_keys(1)&_pragma=busy_timeout(5000)
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?set BOOTSTRAP_ADMIN_EMAIL in .env}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set BOOTSTRAP_ADMIN_PASSWORD in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      MAX_CLOUD_DOCUMENT_BYTES: ${MAX_CLOUD_DOCUMENT_BYTES:-2097152}
      EXPOSE_RESET_TOKEN: "false"
      EXPOSE_VERIFICATION_CODE: "false"
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      RELEASE_STORAGE_DIR: /data/releases
      MAX_RELEASE_ARTIFACT_BYTES: ${MAX_RELEASE_ARTIFACT_BYTES:-262144000}
      CLASSING_SMTP_PASSWORD: ${CLASSING_SMTP_PASSWORD:-}
      EMAIL_VERIFICATION_TTL: ${EMAIL_VERIFICATION_TTL:-10m}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      TURNSTILE_REQUIRED: ${TURNSTILE_REQUIRED:-false}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.0/8,::1/128}
    ports:
      - "127.0.0.1:${CLASSING_PORT:-8080}:8080"
    volumes:
      - classing-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  classing-data:
