services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-classing}
      POSTGRES_USER: ${POSTGRES_USER:-classing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - classing-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-classing} -d ${POSTGRES_DB:-classing}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [classing]

  classing:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CLASSING_IMAGE:-classing-backend:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://api-classing.underflo.ink}
      DATABASE_DRIVER: pgx
      DATABASE_URL: postgres://${POSTGRES_USER:-classing}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-classing}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?set BOOTSTRAP_ADMIN_EMAIL in .env}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set BOOTSTRAP_ADMIN_PASSWORD in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      MAX_CLOUD_DOCUMENT_BYTES: ${MAX_CLOUD_DOCUMENT_BYTES:-2097152}
      EXPOSE_RESET_TOKEN: "false"
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      RELEASE_STORAGE_DIR: /data/releases
      MAX_RELEASE_ARTIFACT_BYTES: ${MAX_RELEASE_ARTIFACT_BYTES:-262144000}
      CLASSING_SMTP_PASSWORD: ${CLASSING_SMTP_PASSWORD:-}
      AI_PROVIDER_KEY_DEFAULT: ${AI_PROVIDER_KEY_DEFAULT:-}
      EMAIL_VERIFICATION_TTL: ${EMAIL_VERIFICATION_TTL:-10m}
      EXPOSE_VERIFICATION_CODE: "false"
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      TURNSTILE_REQUIRED: ${TURNSTILE_REQUIRED:-false}
      LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:-}
      LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:-}
      LEGAL_CROSS_BORDER_URL: ${LEGAL_CROSS_BORDER_URL:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.0/8,::1/128}
    ports:
      - "127.0.0.1:${CLASSING_PORT:-8080}:8080"
    volumes:
      - classing-releases:/data/releases
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [classing]

volumes:
  classing-postgres:
  classing-releases:

networks:
  classing:
